appId: com.ossimulator.memseg
productName: "OS Memory Segmentation Simulator"
directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  # Exclude heavy dev-only files from the bundle
  - "!node_modules/.cache"
  - "!node_modules/**/{test,tests,__tests__}/**"
  - "!node_modules/**/*.{md,ts,map}"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/LICENSE*"

asar: true
compression: maximum

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.png
